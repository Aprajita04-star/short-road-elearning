<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <meta http-equiv="X-UA-Compatible" content="ie=edge">
     <meta name="description" content="Short Road is an e-learning platform offering courses to help you master tech skills easily and effectively.">
     <meta name="keywords" content="e-learning, tech skills, online courses, tech education">

     <title>Short Road - E-learning Platform</title>
     <link rel="stylesheet" href="demo.css">
</head>
<body>
    <header>
        <div class="container">
            <img src="SHORTROAD.jpg" alt="Short Road Logo" class="logo"> <!-- Replace with your logo -->
            <nav>
                <ul>
                    <li><a href="#home">Home</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <input type="text" class="search-bar" placeholder="Search courses...">
            <button id="theme-toggle">Dark Mode</button>
        </div>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h1>Welcome to Short Road</h1>
            <p>A Simplified Path to Mastery in Tech Skills</p>
            <a href="courses.html" class="btn">Explore Courses</a>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 Short Road. All rights reserved.</p>
            <ul class="social-links">
                <li><a href="#">Facebook</a></li>
                <li><a href="#">Twitter</a></li>
                <li><a href="#">LinkedIn</a></li>
            </ul>
        </div>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            themeToggle.textContent = document.body.classList.contains('dark-mode') ? 'Light Mode' : 'Dark Mode';
        });
    </script>
</body>
</html>
